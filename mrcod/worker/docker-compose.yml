services:
  caddy:
    image: "registry.gitlab.com/mrcod/caddy:latest"
    restart: unless-stopped
    environment:
      # БЫЛО 2019 по умолчанию — worker ждёт admin на 9000, иначе он висит
      # на "waiting for caddy admin" и не поднимает свой :8080.
      CADDY_ADMIN_PORT: "${CADDY_ADMIN_PORT:-9000}"
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    expose:
      # admin только внутри docker-сети, наружу НЕ публикуем
      - "${CADDY_ADMIN_PORT:-9000}"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  worker:
    image: "registry.gitlab.com/mrcod/worker:latest"
    restart: unless-stopped
    depends_on:
      - caddy
    environment:
      - HTTP_ADDR=:8080
      - SSH_BIND_HOST=0.0.0.0
      - SSH_PUBLIC_HOST=${SSH_PUBLIC_HOST}
      - FORWARD_BIND_HOST=0.0.0.0
      - FORWARD_PUBLIC_HOST=worker
      - REMOTE_FORWARD_BIND_ADDR=0.0.0.0
      - CADDY_ADMIN_HOST=caddy
      - CADDY_ADMIN_PORT=9000
      - CADDY_SERVER_NAME=srv0
      - ALLOWED_DOMAIN_SUFFIXES=${ALLOWED_DOMAIN_SUFFIXES}
      - SSH_PORT_RANGE_START=${SSH_PORT_RANGE_START:-50000}
      - SSH_PORT_RANGE_END=${SSH_PORT_RANGE_END:-50100}
      - FORWARD_PORT_RANGE_START=${FORWARD_PORT_RANGE_START:-40000}
      - FORWARD_PORT_RANGE_END=${FORWARD_PORT_RANGE_END:-40100}
      - CONNECT_TIMEOUT_SEC=60
      - SIGNING_KEYS_JSON=${SIGNING_KEYS_JSON}
      - SSH_HOST_KEY_PATH=/app/ssh/ssh_host_key
      - LOG_LEVEL=info
    ports:
      # control-API для infra (публичный IP, без VPN) — ОБЯЗАТЕЛЬНО зафаерволить
      # на IP infra. API подписан broker-ключом, но не шифрован (plain HTTP).
      - "8080:8080"
      - "${SSH_PORT_RANGE_START:-50000}-${SSH_PORT_RANGE_END:-50100}:${SSH_PORT_RANGE_START:-50000}-${SSH_PORT_RANGE_END:-50100}"
    volumes:
      - worker_ssh:/app/ssh

volumes:
  caddy_data:
  caddy_config:
  worker_ssh:
