services:
  infra:
    image: "registry.gitlab.com/mrcod/infra:latest"
    restart: unless-stopped
    ports:
      - "${INFRA_HTTP_PORT:-8082}:8082"
    environment:
      HTTP_ADDR: ":8082"
      LOG_LEVEL: "info"

      BACK_API_BASE_URL: "${BACK_API_BASE_URL}"
      INFRA_SHARED_TOKEN: "${INFRA_SHARED_TOKEN}"

      BROKER_ED25519_PRIVATE_KEY_PEM: "${BROKER_ED25519_PRIVATE_KEY_PEM}"
      BROKER_KEY_ID: "${BROKER_KEY_ID:-broker-key-1}"

      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
      CLOUDFLARE_ZONE_ID: "${CLOUDFLARE_ZONE_ID}"
      CLOUDFLARE_BASE_DOMAIN_ZONE_ID: "${CLOUDFLARE_BASE_DOMAIN_ZONE_ID}"
      CLOUDFLARE_DNS_TARGET_ZONE_ID: "${CLOUDFLARE_DNS_TARGET_ZONE_ID}"
      CLOUDFLARE_CNAME_TARGET: "${CLOUDFLARE_CNAME_TARGET:-page.nozi.io}"
      CLOUDFLARE_TIMEOUT: "${CLOUDFLARE_TIMEOUT:-10s}"

      HOST_BASE_DOMAIN_SUFFIX: "${HOST_BASE_DOMAIN_SUFFIX:-mrcod.ru}"
      HOST_DNS_TARGET_SUFFIX: "${HOST_DNS_TARGET_SUFFIX:-server.nozi.io}"

      SPRINTBOX_API_BASE_URL: "${SPRINTBOX_API_BASE_URL:-https://api.from.sh/sprintbox}"
      SPRINTBOX_LOGIN: "${SPRINTBOX_LOGIN}"
      SPRINTBOX_KEY: "${SPRINTBOX_KEY}"
      SPRINTBOX_TIMEOUT: "${SPRINTBOX_TIMEOUT:-60s}"
      SPRINTBOX_PUBKEY: "${SPRINTBOX_PUBKEY}"
      SPRINTBOX_USE_VLAN: "${SPRINTBOX_USE_VLAN:-false}"

      SPRINTBOX_SHARED_SERVICE: "${SPRINTBOX_SHARED_SERVICE}"
      SPRINTBOX_SHARED_ARCH: "${SPRINTBOX_SHARED_ARCH:-x64}"
      SPRINTBOX_SHARED_DISTRIBUTIVE: "${SPRINTBOX_SHARED_DISTRIBUTIVE}"

      SPRINTBOX_VIP_RU_SERVICE: "${SPRINTBOX_VIP_RU_SERVICE}"
      SPRINTBOX_VIP_RU_ARCH: "${SPRINTBOX_VIP_RU_ARCH:-x64}"
      SPRINTBOX_VIP_RU_DISTRIBUTIVE: "${SPRINTBOX_VIP_RU_DISTRIBUTIVE}"

      SPRINTBOX_VIP_EU_SERVICE: "${SPRINTBOX_VIP_EU_SERVICE}"
      SPRINTBOX_VIP_EU_ARCH: "${SPRINTBOX_VIP_EU_ARCH:-x64}"
      SPRINTBOX_VIP_EU_DISTRIBUTIVE: "${SPRINTBOX_VIP_EU_DISTRIBUTIVE}"

      HOST_BOOTSTRAP_SSH_USER: "${HOST_BOOTSTRAP_SSH_USER:-root}"
      HOST_BOOTSTRAP_SSH_PORT: "${HOST_BOOTSTRAP_SSH_PORT:-22}"
      HOST_BOOTSTRAP_SSH_PRIVATE_KEY_PATH: "/app/data/host_bootstrap_ssh_key"
      HOST_BOOTSTRAP_CONNECT_TIMEOUT: "${HOST_BOOTSTRAP_CONNECT_TIMEOUT:-2m}"
      HOST_BOOTSTRAP_COMMAND_TIMEOUT: "${HOST_BOOTSTRAP_COMMAND_TIMEOUT:-5m}"
      HOST_BOOTSTRAP_DEPLOY_DIR: "${HOST_BOOTSTRAP_DEPLOY_DIR:-/opt/mrcod}"
      HOST_BOOTSTRAP_UPDATE_INTERVAL: "${HOST_BOOTSTRAP_UPDATE_INTERVAL:-5m}"

      HOST_BOOTSTRAP_REPO_URL: "${HOST_BOOTSTRAP_REPO_URL:-https://github.com/Dschek/env.git}"
      HOST_BOOTSTRAP_REPO_REF: "${HOST_BOOTSTRAP_REPO_REF:-main}"
      HOST_BOOTSTRAP_COMPOSE_FILE: "${HOST_BOOTSTRAP_COMPOSE_FILE:-mrcod/worker/docker-compose.yml}"
      HOST_BOOTSTRAP_ENV_FILE: "${HOST_BOOTSTRAP_ENV_FILE}"
      HOST_BOOTSTRAP_REPO_USERNAME: "${HOST_BOOTSTRAP_REPO_USERNAME}"
      HOST_BOOTSTRAP_REPO_PASSWORD: "${HOST_BOOTSTRAP_REPO_PASSWORD}"

      HOST_BOOTSTRAP_REGISTRY_SERVER: "${HOST_BOOTSTRAP_REGISTRY_SERVER:-registry.gitlab.com}"
      HOST_BOOTSTRAP_REGISTRY_USERNAME: "${HOST_BOOTSTRAP_REGISTRY_USERNAME}"
      HOST_BOOTSTRAP_REGISTRY_PASSWORD: "${HOST_BOOTSTRAP_REGISTRY_PASSWORD}"

      WORKER_RUNTIME_BOOTSTRAP_URL: "${WORKER_RUNTIME_BOOTSTRAP_URL:-https://nozi.io/api/internal/worker/bootstrap-env}"
      WORKER_RUNTIME_BOOTSTRAP_TIMEOUT_SEC: "${WORKER_RUNTIME_BOOTSTRAP_TIMEOUT_SEC:-15}"
      WORKER_RUNTIME_BOOTSTRAP_STATE_PATH: "${WORKER_RUNTIME_BOOTSTRAP_STATE_PATH:-/app/bootstrap/bootstrap_env.json}"

      WORKER_BOOTSTRAP_HTTP_ADDR: "${WORKER_BOOTSTRAP_HTTP_ADDR:-:8080}"
      WORKER_BOOTSTRAP_SSH_BIND_HOST: "${WORKER_BOOTSTRAP_SSH_BIND_HOST:-0.0.0.0}"
      WORKER_BOOTSTRAP_FORWARD_BIND_HOST: "${WORKER_BOOTSTRAP_FORWARD_BIND_HOST:-0.0.0.0}"
      WORKER_BOOTSTRAP_FORWARD_PUBLIC_HOST: "${WORKER_BOOTSTRAP_FORWARD_PUBLIC_HOST:-worker}"
      WORKER_BOOTSTRAP_REMOTE_FORWARD_BIND_ADDR: "${WORKER_BOOTSTRAP_REMOTE_FORWARD_BIND_ADDR:-0.0.0.0}"
      WORKER_BOOTSTRAP_CADDY_ADMIN_HOST: "${WORKER_BOOTSTRAP_CADDY_ADMIN_HOST:-caddy}"
      WORKER_BOOTSTRAP_CADDY_ADMIN_PORT: "${WORKER_BOOTSTRAP_CADDY_ADMIN_PORT:-9000}"
      WORKER_BOOTSTRAP_CADDY_SERVER_NAME: "${WORKER_BOOTSTRAP_CADDY_SERVER_NAME:-srv0}"
      WORKER_BOOTSTRAP_ALLOWED_DOMAIN_SUFFIXES: "${WORKER_BOOTSTRAP_ALLOWED_DOMAIN_SUFFIXES:-mrcod.ru,domains.nozi.io}"
      WORKER_BOOTSTRAP_SSH_PORT_RANGE_START: "${WORKER_BOOTSTRAP_SSH_PORT_RANGE_START:-50000}"
      WORKER_BOOTSTRAP_SSH_PORT_RANGE_END: "${WORKER_BOOTSTRAP_SSH_PORT_RANGE_END:-50100}"
      WORKER_BOOTSTRAP_FORWARD_PORT_RANGE_START: "${WORKER_BOOTSTRAP_FORWARD_PORT_RANGE_START:-40000}"
      WORKER_BOOTSTRAP_FORWARD_PORT_RANGE_END: "${WORKER_BOOTSTRAP_FORWARD_PORT_RANGE_END:-40100}"
      WORKER_BOOTSTRAP_CONNECT_TIMEOUT_SEC: "${WORKER_BOOTSTRAP_CONNECT_TIMEOUT_SEC:-60}"
      WORKER_BOOTSTRAP_SSH_HOST_KEY_PATH: "${WORKER_BOOTSTRAP_SSH_HOST_KEY_PATH:-/app/ssh/ssh_host_key}"
      WORKER_BOOTSTRAP_LOG_LEVEL: "${WORKER_BOOTSTRAP_LOG_LEVEL:-info}"
    volumes:
      - infra_data:/app/data

volumes:
  infra_data:
